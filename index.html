<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #000000; /* Чисто черный фон */
            --text-color: #ffffff;
            --accent-color: #bb86fc;
            --card-bg: rgba(45, 45, 45, 0.65); /* Оптимальная прозрачность под точки */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            padding-bottom: 80px; 
            user-select: none;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Канвас для интерактивных желтых точек */
        #dotsCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .content-wrapper, header, nav {
            position: relative;
            z-index: 1;
        }

        /* Шапка */
        header {
            background-color: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* КОНТЕНТНЫЕ ЗОНЫ С ИДЕАЛЬНОЙ АНИМАЦИЕЙ ВЫПЛЫВАНИЯ */
        .page {
            display: none;
            padding: 15px;
            opacity: 0;
            transform: translateY(12px);
            will-change: transform, opacity;
        }

        .page.active {
            display: block;
            animation: cubicPageIn 0.35s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
        }

        @keyframes cubicPageIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Карточки товаров (Главная) + Микро-отклик при тапе */
        .catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .product-card {
            background-color: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.2s ease;
        }

        .product-card:active {
            transform: scale(0.98);
            border-color: rgba(187, 134, 252, 0.2);
        }

        .product-card img {
            width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .product-title {
            font-size: 14px;
            margin: 8px 0;
        }

        .product-price {
            font-weight: bold;
            color: var(--accent-color);
            margin-bottom: 8px;
        }

        /* Кнопка с анимацией клика */
        .btn {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
            background-color: #d1adff;
        }

        /* Нижний Таббар */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background-color: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1000;
            padding-bottom: env(safe-area-inset-bottom);
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #777;
            text-decoration: none;
            font-size: 11px;
            background: none;
            border: none;
            cursor: pointer;
            flex: 1;
            transition: color 0.25s ease;
        }

        .tab-item.active {
            color: var(--accent-color);
        }

        /* Пружинистая анимация для иконок в таббаре */
        .tab-icon {
            font-size: 20px;
            margin-bottom: 2px;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }

        .tab-item.active .tab-icon {
            transform: scale(1.22) translateY(-2px);
        }
    </style>
</head>
<body>

    <canvas id="dotsCanvas"></canvas>

    <div class="content-wrapper">
        <header id="header-title">Vape Shop</header>

        <div id="home-page" class="page active">
            <div class="catalog">
                <div class="product-card">
                    <div style="background:rgba(255,255,255,0.06); height:100px; border-radius:8px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; font-size: 32px;">💨</div>
                    <div class="product-title">Испаритель X-Pod</div>
                    <div class="product-price">1500 ₽</div>
                    <button class="btn" onclick="addToCart('Испаритель X-Pod', 1500)">В корзину</button>
                </div>
                <div class="product-card">
                    <div style="background:rgba(255,255,255,0.06); height:100px; border-radius:8px; margin-bottom:8px; display:flex; align-items:center; justify-content:center; font-size: 32px;">🍓</div>
                    <div class="product-title">Жидкость Berry Mix</div>
                    <div class="product-price">550 ₽</div>
                    <button class="btn" onclick="addToCart('Жидкость Berry Mix', 550)">В корзину</button>
                </div>
            </div>
        </div>

        <div id="cart-page" class="page">
            <div class="product-card" style="text-align: left; max-width: 600px; margin: 0 auto;">
                <h3 style="margin-top: 0;">Ваш заказ</h3>
                <div id="cart-items">Корзина пуста</div>
                <hr style="border-color: rgba(255,255,255,0.08); margin: 15px 0;">
                <div style="display: flex; justify-content: space-between; font-weight: bold;">
                    <span>Итого:</span>
                    <span id="cart-total">0 ₽</span>
                </div>
                <button class="btn" style="margin-top: 20px;" onclick="checkout()">Оформить заказ</button>
            </div>
        </div>

        <div id="profile-page" class="page">
            <div class="product-card" style="text-align: left; max-width: 600px; margin: 0 auto;">
                <p style="margin-top:0;"><strong>Привет, <span id="user-name">Гость</span>!</strong></p>
                <p>Ваш ID: <span id="user-id">-</span></p>
                <p style="margin-bottom:0;">Статус: Постоянный клиент</p>
            </div>
        </div>

        <nav class="tabbar">
            <button class="tab-item active" onclick="switchTab('home', this)">
                <span class="tab-icon">🏠</span>
                <span>Домик</span>
            </button>
            <button class="tab-item" onclick="switchTab('cart', this)">
                <span class="tab-icon">🛒</span>
                <span>Корзина</span>
            </button>
            <button class="tab-item" onclick="switchTab('profile', this)">
                <span class="tab-icon">👤</span>
                <span>Профиль</span>
            </button>
        </nav>
    </div>

    <script>
        // --- ЛОГИКА ТЕЛЕГРАМА (БАЗА) ---
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
        }

        function switchTab(pageId, element) {
            const currentPage = document.querySelector('.page.active');
            const targetPage = document.getElementById(`${pageId}-page`);
            
            if(currentPage === targetPage) return;

            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
            
            targetPage.classList.add('active');
            element.classList.add('active');

            const headers = { 'home': 'Vape Shop', 'cart': 'Корзина', 'profile': 'Профиль' };
            document.getElementById('header-title').innerText = headers[pageId];
            
            tg.HapticFeedback.impactOccurred('light'); // Мягкая вибрация при переключении табов
        }

        let cart = [];
        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
            tg.HapticFeedback.notificationOccurred('success'); 
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            if (cart.length === 0) {
                container.innerHTML = 'Корзина пуста';
                totalEl.innerText = '0 ₽';
                return;
            }
            container.innerHTML = cart.map(item => `<div style="display:flex; justify-content:space-between; margin-bottom:10px;"><span>${item.name}</span><span style="font-weight:500;">${item.price} ₽</span></div>`).join('');
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `${total.toLocaleString()} ₽`;
        }

        function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            tg.sendData(JSON.stringify({ action: 'order', items: cart, total: total }));
        }

        // --- ИДЕАЛЬНЫЙ СКРИПТ ЖЕЛТЫХ ИНТЕРАКТИВНЫХ ТОЧЕК ---
        const canvas = document.getElementById('dotsCanvas');
        const ctx = canvas.getContext('2d');

        let pointer = { x: null, y: null, radius: 80 }; // Зона отталкивания пальца

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Отслеживание касаний экрана для физики точек
        window.addEventListener('mousemove', (e) => { pointer.x = e.clientX; pointer.y = e.clientY; });
        window.addEventListener('mouseleave', () => { pointer.x = null; pointer.y = null; });
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) { pointer.x = e.touches[0].clientX; pointer.y = e.touches[0].clientY; } });
        window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) { pointer.x = e.touches[0].clientX; pointer.y = e.touches[0].clientY; } });
        window.addEventListener('touchend', () => { pointer.x = null; pointer.y = null; });

        const dots = [];
        const dotsCount = 45; 

        for (let i = 0; i < dotsCount; i++) {
            let rx = Math.random() * window.innerWidth;
            let ry = Math.random() * window.innerHeight;
            dots.push({
                x: rx,
                y: ry,
                baseX: rx, // Родные координаты для возврата назад
                baseY: ry,
                radius: Math.random() * 1.8 + 1, 
                speedY: -(Math.random() * 0.3 + 0.15), // Скорость подъема вверх
                angle: Math.random() * Math.PI * 2,    // Угол для синусоидного покачивания
                angleSpeed: Math.random() * 0.02 + 0.01,
                alpha: Math.random(), 
                fadeSpeed: Math.random() * 0.008 + 0.004
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            dots.forEach(dot => {
                // Эффект плавного мерцания (перелива)
                dot.alpha += dot.fadeSpeed;
                if (dot.alpha > 0.95 || dot.alpha < 0.15) {
                    dot.fadeSpeed = -dot.fadeSpeed;
                }
                let currentAlpha = Math.max(0.15, Math.min(0.95, dot.alpha));

                // Естественный дрейф вверх и покачивание по X
                dot.baseY += dot.speedY;
                dot.angle += dot.angleSpeed;
                let currentX = dot.baseX + Math.sin(dot.angle) * 8;
                let currentY = dot.baseY;

                // ФИЗИКА: Отталкивание от пальца/курсора
                if (pointer.x !== null && pointer.y !== null) {
                    let dx = currentX - pointer.x;
                    let dy = currentY - pointer.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < pointer.radius) {
                        let force = (pointer.radius - distance) / pointer.radius;
                        // Выталкиваем точку наружу радиуса действия пальца
                        let forceX = (dx / distance) * force * 35;
                        let forceY = (dy / distance) * force * 35;
                        currentX += forceX;
                        currentY += forceY;
                    }
                }

                // Рисуем точку (Насыщенный теплый желтый)
                ctx.beginPath();
                ctx.arc(currentX, currentY, dot.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(254, 204, 40, ${currentAlpha})`; 
                ctx.shadowBlur = 6; 
                ctx.shadowColor = 'rgba(254, 204, 40, 0.4)';
                ctx.fill();

                // Телепортация точки вниз, если она уплыла наверх
                if (dot.baseY < -10) {
                    dot.baseY = canvas.height + 10;
                    dot.baseX = Math.random() * canvas.width;
                }
            });

            ctx.shadowBlur = 0; 
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
