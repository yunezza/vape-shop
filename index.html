<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vape Shop Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0a12; /* Глубокий темный фон */
            --card-bg: #14131d; /* Цвет карточек из видео */
            --accent-color: #a855f7; /* Неоновый фиолетовый акцент */
            --text-main: #ffffff;
            --text-muted: #7e7c8c;
            --border-color: rgba(168, 85, 247, 0.25); /* Полупрозрачная фиолетовая рамка */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1a1235 0%, var(--bg-color) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            padding-bottom: 85px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка приложения */
        header {
            padding: 20px 15px 10px 15px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(168, 85, 247, 0.1);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        /* Контейнеры/Карточки как на видео */
        .card-container {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            margin: 0 15px 15px 15px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
        }

        .card-title {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Контурные кнопки из референса */
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 40px; /* Идеально круглые края (капсула) */
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            transition: all 0.2s ease;
        }

        .btn-outline:last-child {
            margin-bottom: 0;
        }

        .btn-outline:active {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent-color);
        }

        /* Стили страниц */
        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* Сетка товаров */
        .catalog-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 0 15px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            text-align: center;
        }

        .product-img {
            background: linear-gradient(135deg, #231b3e 0%, #14131d 100%);
            height: 110px;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .product-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-main);
        }

        .product-price {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 10px;
        }

        .product-card .btn-outline {
            padding: 8px;
            font-size: 13px;
        }

        /* Премиальный нижний таббар */
        .tabbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 65px;
            background: rgba(20, 19, 29, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 1000;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            flex: 1;
            font-size: 11px;
            font-weight: 500;
            gap: 4px;
        }

        .tab-item.active {
            color: var(--accent-color);
        }

        .tab-icon {
            font-size: 20px;
            transition: transform 0.2s ease;
        }

        .tab-item.active .tab-icon {
            transform: scale(1.1);
        }

        /* Элементы корзины */
        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <center>
        <div class="header-badge" id="header-tag">Основная линейка ▾</div>
    </center>

    <div id="home-page" class="page active">
        <div class="catalog-grid">
            <div class="product-card">
                <div class="product-img">💨</div>
                <div class="product-name">Испаритель X-Pod</div>
                <div class="product-price">1 500 ₽</div>
                <button class="btn-outline" onclick="addToCart('Испаритель X-Pod', 1500)">+ В корзину</button>
            </div>
            <div class="product-card">
                <div class="product-img">🍓</div>
                <div class="product-name">Berry Mix 30мл</div>
                <div class="product-price">550 ₽</div>
                <button class="btn-outline" onclick="addToCart('Berry Mix 30мл', 550)">+ В корзину</button>
            </div>
        </div>
    </div>

    <div id="cart-page" class="page">
        <div class="card-container">
            <div class="card-title"><span>Ваш заказ</span> <span id="cart-count">0 шт</span></div>
            <div id="cart-items" style="color: var(--text-muted); font-size: 14px;">Корзина пуста</div>
            
            <div style="display: flex; justify-content: space-between; margin-top: 20px; font-weight: 600;">
                <span>Итого:</span>
                <span id="cart-total" style="color: var(--accent-color);">0 ₽</span>
            </div>
        </div>
        
        <div style="padding: 0 15px;">
            <button class="btn-outline" style="border-color: var(--accent-color); color: var(--accent-color);" onclick="checkout()">
                <span>📥</span> Оформить заказ
            </button>
        </div>
    </div>

    <div id="profile-page" class="page">
        <div class="card-container">
            <div class="card-title">Личный кабинет</div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div>Пользователь: <span id="user-name" style="color: var(--accent-color); font-weight: 500;">Гость</span></div>
                <div style="font-size: 13px; color: var(--text-muted);">ID: <span id="user-id">-</span></div>
            </div>
        </div>

        <div class="card-container">
            <div class="card-title">Настройки и трекинг</div>
            <button class="btn-outline">⏳ История заказов</button>
            <button class="btn-outline">🎁 Мои бонусы</button>
        </div>
    </div>

    <nav class="tabbar">
        <button class="tab-item active" onclick="switchTab('home', this)">
            <span class="tab-icon">🏠</span>
            <span>Домик</span>
        </button>
        <button class="tab-item" onclick="switchTab('cart', this)">
            <span class="tab-icon">🛒</span>
            <span>Корзина</span>
        </button>
        <button class="tab-item" onclick="switchTab('profile', this)">
            <span class="tab-icon">👤</span>
            <span>Профиль</span>
        </button>
    </nav>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        // Включаем адаптивные цвета под тему Telegram, если нужно
        tg.ready();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
            document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
        }

        function switchTab(pageId, element) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
            
            document.getElementById(`${pageId}-page`).classList.add('active');
            element.classList.add('active');

            const tags = { 'home': 'Основная линейка ▾', 'cart': 'Оформление ▾', 'profile': 'Кабинет ▾' };
            document.getElementById('header-tag').innerText = tags[pageId];
            
            tg.HapticFeedback.impactOccurred('light'); // Легкая тактильная отдача при смене вкладок
        }

        let cart = [];
        function addToCart(name, price) {
            cart.push({ name, price });
            updateCart();
            tg.HapticFeedback.notificationOccurred('success'); // Вибрация успеха
        }

        function updateCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            const countEl = document.getElementById('cart-count');
            
            countEl.innerText = `${cart.length} шт`;
            
            if (cart.length === 0) {
                container.innerHTML = 'Корзина пуста';
                totalEl.innerText = '0 ₽';
                return;
            }
            
            container.innerHTML = cart.map(item => `
                <div class="cart-item">
                    <span>${item.name}</span>
                    <span style="color: #fff; font-weight: 500;">${item.price} ₽</span>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            totalEl.innerText = `${total.toLocaleString()} ₽`;
        }

        function checkout() {
            if (cart.length === 0) return;
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            
            tg.sendData(JSON.stringify({
                action: 'order',
                items: cart,
                total: total
            }));
        }
    </script>
</body>
</html>
